<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ELVIRA SAYAR // JOURNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Space Mono', monospace; }

/* Video + canvas side by side, canvas is the one shown */
#videoRaw {
  position: fixed;
  width: 1px; height: 1px;
  opacity: 0; pointer-events: none;
  top: -9999px;
}

/* Canvas shows the composited frame */
#liveCanvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ── SIZING TOKENS ── */
:root {
  --pad-x: 52px;
  --pad-y: 32px;
  --inner-pad: 20px;
  --corner: 44px;
  --cw: 2px;
  --controls-h: 92px;
  --name-size: 18px;
  --tag-size: 9.5px;
  --rec-size: 11px;
  --loc-label: 8px;
  --loc-size: 15px;
  --coords-size: 8px;
  --time-size: 38px;
  --date-size: 12px;
  --sess-size: 8px;
}
@media (max-width: 600px) {
  :root {
    --pad-x: 22px; --pad-y: 24px; --inner-pad: 14px;
    --corner: 32px; --cw: 1.5px; --controls-h: 108px;
    --name-size: 15px; --tag-size: 8px; --rec-size: 10px;
    --loc-label: 7px; --loc-size: 13px; --coords-size: 7px;
    --time-size: 30px; --date-size: 11px; --sess-size: 7px;
  }
}

/* ── OVERLAY (HTML layer on top of canvas — NOT recorded) ── */
/* We use this only for the controls UI. The visual overlay is drawn on canvas. */
.ui-layer {
  position: fixed; inset: 0; z-index: 10;
  pointer-events: none;
}

/* ── CONTROLS ── */
.controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 20; height: var(--controls-h);
  display: none; align-items: center; justify-content: center;
  gap: 44px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  pointer-events: all;
  background: linear-gradient(0deg, rgba(0,3,14,0.82) 0%, transparent 100%);
}
.controls.on { display: flex; }

.btn-aux {
  width: 46px; height: 46px; border-radius: 50%;
  border: 1.5px solid rgba(180,210,255,0.32);
  background: rgba(0,5,22,0.58);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: border-color 0.2s; position: relative;
}
.btn-aux:active { border-color: rgba(180,210,255,0.75); }
.btn-aux svg { width: 18px; height: 18px; fill: rgba(190,215,255,0.85); }

.btn-rec {
  width: 74px; height: 74px; border-radius: 50%;
  border: 2.5px solid rgba(190,215,255,0.55);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(140,185,255,0.18);
  transition: border-color 0.2s; position: relative;
}
.btn-rec:active { border-color: rgba(190,215,255,0.9); }
.btn-rec-inner {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(225,238,255,0.94);
  box-shadow: 0 0 20px rgba(160,200,255,0.4);
  transition: border-radius 0.25s, transform 0.22s, background 0.22s;
}
.btn-rec.on .btn-rec-inner {
  border-radius: 9px; background: rgba(255,85,85,0.9); transform: scale(0.75);
}

.tooltip {
  position: absolute; bottom: calc(100% + 10px); left: 50%;
  transform: translateX(-50%);
  background: rgba(0,5,22,0.88); border: 1px solid rgba(160,200,255,0.25);
  color: rgba(200,220,255,0.82); font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
  padding: 6px 10px; white-space: nowrap; opacity: 0;
  transition: opacity 0.18s; pointer-events: none;
  backdrop-filter: blur(10px);
}
.tooltip::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 5px solid transparent;
  border-top-color: rgba(160,200,255,0.25);
}
.btn-aux:hover .tooltip,
.btn-rec:hover .tooltip { opacity: 1; }

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0; z-index: 30;
  background: #00030e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.splash-line {
  width: 1px; height: 52px;
  background: linear-gradient(180deg, transparent, rgba(160,200,255,0.45), transparent);
  margin-bottom: 6px;
}
.splash-name {
  font-family: 'Inter', sans-serif; font-weight: 100;
  font-size: clamp(22px, 5vw, 32px); letter-spacing: 0.44em;
  color: rgba(225,240,255,0.94); text-transform: uppercase; text-align: center;
  text-shadow: 0 0 28px rgba(140,185,255,0.4);
}
.splash-sub {
  font-size: clamp(8px, 2vw, 10px); letter-spacing: 0.26em;
  color: rgba(150,178,228,0.44); text-transform: uppercase;
  text-align: center; line-height: 2;
}
.splash-btn {
  margin-top: 22px; padding: 16px 46px;
  border: 1px solid rgba(170,205,255,0.42);
  background: transparent; color: rgba(215,232,255,0.88);
  font-family: 'Space Mono', monospace; font-size: clamp(10px, 2.5vw, 12px);
  letter-spacing: 0.28em; text-transform: uppercase;
  cursor: pointer; transition: border-color 0.2s, color 0.2s; -webkit-appearance: none;
}
.splash-btn:hover { border-color: rgba(170,205,255,0.78); color: rgba(235,248,255,0.96); }

.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 40; font-family: 'Inter', sans-serif; font-weight: 200;
  font-size: 12px; letter-spacing: 0.32em; color: rgba(220,238,255,0.96);
  text-transform: uppercase; text-align: center; padding: 18px 36px;
  border: 1px solid rgba(160,200,255,0.35); background: rgba(0,5,20,0.9);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  opacity: 0; transition: opacity 0.35s; pointer-events: none;
}
.toast.on { opacity: 1; }
</style>
</head>
<body>

<video id="videoRaw" autoplay playsinline muted></video>
<canvas id="liveCanvas"></canvas>

<div class="controls" id="controls">
  <button class="btn-aux" onclick="flipCam()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
    </svg>
    <div class="tooltip">FLIP CAMERA</div>
  </button>
  <button class="btn-rec" id="recBtn" onclick="toggleRec()">
    <div class="btn-rec-inner"></div>
    <div class="tooltip" id="recTooltip">START REC</div>
  </button>
  <div style="width:46px"></div>
</div>

<div id="splash">
  <div class="splash-line"></div>
  <div class="splash-name">ELVIRA SAYAR</div>
  <div class="splash-sub">PERSONAL ARCHIVE<br>VISUAL JOURNAL</div>
  <button class="splash-btn" onclick="start()">INITIALIZE</button>
</div>

<div class="toast" id="toast">VIDEO SAVED</div>

<script>
// ── STATE ──
let stream, facingMode = 'user';
let recorder, chunks = [], recStart, recTimer;
let animFrame;
let cityText = '—', coordsText = '—', recDurText = '';
let isRecording = false;

const pad = n => String(n).padStart(2,'0');
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

const video  = document.getElementById('videoRaw');
const canvas = document.getElementById('liveCanvas');
const ctx    = canvas.getContext('2d');

// ── CANVAS SIZING ──
function resizeCanvas() {
  canvas.width  = window.innerWidth  * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── DRAW LOOP ──
function drawFrame() {
  const W = canvas.width, H = canvas.height;
  const dpr = devicePixelRatio;
  ctx.clearRect(0, 0, W, H);

  // 1. Video frame
  if (video.readyState >= 2) {
    ctx.drawImage(video, 0, 0, W, H);
  }

  // 2. Vignette
  const vTop = ctx.createLinearGradient(0, 0, 0, H);
  vTop.addColorStop(0,    'rgba(0,4,18,0.88)');
  vTop.addColorStop(0.20, 'rgba(0,4,18,0)');
  vTop.addColorStop(0.68, 'rgba(0,4,18,0)');
  vTop.addColorStop(1,    'rgba(0,4,18,0.90)');
  ctx.fillStyle = vTop;
  ctx.fillRect(0, 0, W, H);

  // Radial vignette
  const vRad = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.75);
  vRad.addColorStop(0, 'rgba(0,4,18,0)');
  vRad.addColorStop(1, 'rgba(0,4,18,0.5)');
  ctx.fillStyle = vRad;
  ctx.fillRect(0, 0, W, H);

  // 3. Scanlines
  ctx.fillStyle = 'rgba(0,6,24,0.055)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }

  const now = new Date();
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const dateStr = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

  // Layout constants (scaled by dpr)
  const PX = 52 * dpr;   // pad-x
  const PY = 32 * dpr;   // pad-y
  const CS = 44 * dpr;   // corner size
  const IP = 20 * dpr;   // inner pad

  // ── 4. CORNER BRACKETS ──
  const bBottom = H - 92 * dpr; // controls-h
  ctx.strokeStyle = 'rgba(190,215,255,0.82)';
  ctx.lineWidth = 2 * dpr;
  ctx.shadowColor = 'rgba(160,200,255,0.5)';
  ctx.shadowBlur = 8 * dpr;

  // TL
  ctx.beginPath(); ctx.moveTo(PX, PY + CS); ctx.lineTo(PX, PY); ctx.lineTo(PX + CS, PY); ctx.stroke();
  // TR
  ctx.beginPath(); ctx.moveTo(W - PX - CS, PY); ctx.lineTo(W - PX, PY); ctx.lineTo(W - PX, PY + CS); ctx.stroke();
  // BL
  ctx.beginPath(); ctx.moveTo(PX, bBottom - CS); ctx.lineTo(PX, bBottom); ctx.lineTo(PX + CS, bBottom); ctx.stroke();
  // BR
  ctx.beginPath(); ctx.moveTo(W - PX - CS, bBottom); ctx.lineTo(W - PX, bBottom); ctx.lineTo(W - PX, bBottom - CS); ctx.stroke();

  ctx.shadowBlur = 0;

  // ── 5. H-RULES ──
  function hRule(y) {
    const grd = ctx.createLinearGradient(PX - 2*dpr, 0, W - PX + 2*dpr, 0);
    grd.addColorStop(0,    'rgba(160,200,255,0)');
    grd.addColorStop(0.12, 'rgba(160,200,255,0.15)');
    grd.addColorStop(0.5,  'rgba(190,215,255,0.32)');
    grd.addColorStop(0.88, 'rgba(160,200,255,0.15)');
    grd.addColorStop(1,    'rgba(160,200,255,0)');
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1 * dpr;
    ctx.beginPath(); ctx.moveTo(PX - 2*dpr, y); ctx.lineTo(W - PX + 2*dpr, y); ctx.stroke();
  }
  hRule(PY + CS + 8 * dpr);
  hRule(bBottom + 4 * dpr);

  // ── 6. TOP BLOCK: LOCATION ──
  const topY = PY + CS + IP + 14 * dpr;
  const contentL = PX + CS + IP;
  const contentR = W - PX - CS - IP;

  ctx.textBaseline = 'top';

  // LOCATION label
  ctx.font = `${8 * dpr}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(160,190,240,0.55)';
  ctx.letterSpacing = `${0.28 * 8 * dpr}px`;
  ctx.fillText('LOCATION', contentL, topY);

  // City
  ctx.font = `200 ${15 * dpr}px Inter, sans-serif`;
  ctx.shadowColor = 'rgba(140,185,255,0.6)';
  ctx.shadowBlur = 18 * dpr;
  ctx.fillStyle = 'rgba(230,242,255,0.97)';
  ctx.letterSpacing = `${0.22 * 15 * dpr}px`;
  ctx.fillText(cityText, contentL, topY + 14 * dpr);
  ctx.shadowBlur = 0;

  // Coords
  ctx.font = `${8 * dpr}px 'Space Mono', monospace`;
  ctx.fillStyle = 'rgba(170,200,240,0.55)';
  ctx.letterSpacing = `${0.13 * 8 * dpr}px`;
  ctx.fillText(coordsText, contentL, topY + 34 * dpr);

  // REC indicator — top right
  const recX = contentR;
  const recY = topY + 4 * dpr;
  // Dot
  ctx.beginPath();
  ctx.arc(recX, recY + 4 * dpr, 3.5 * dpr, 0, Math.PI * 2);
  const dotAlpha = isRecording ? (0.5 + 0.5 * Math.sin(Date.now() / 280)) : 0.9;
  ctx.fillStyle = `rgba(210,228,255,${dotAlpha})`;
  ctx.shadowColor = 'rgba(160,200,255,0.8)';
  ctx.shadowBlur = 10 * dpr;
  ctx.fill();
  ctx.shadowBlur = 0;

  // REC label
  ctx.textAlign = 'right';
  ctx.font = `${11 * dpr}px 'Space Mono', monospace`;
  ctx.fillStyle = 'rgba(210,228,255,0.9)';
  ctx.letterSpacing = `${0.3 * 11 * dpr}px`;
  ctx.fillText(isRecording ? 'REC' : 'STANDBY', recX - 12 * dpr, topY);
  ctx.textAlign = 'left';

  // ── 7. BOTTOM BLOCK: NAME GLASS + CLOCK ──
  const botContentY = bBottom - CS - IP - 10 * dpr;

  // Clock block (right side)
  ctx.textAlign = 'right';
  // Time
  ctx.font = `700 ${38 * dpr}px 'Space Mono', monospace`;
  ctx.fillStyle = 'rgba(235,246,255,1)';
  ctx.shadowColor = 'rgba(140,185,255,0.6)';
  ctx.shadowBlur = 28 * dpr;
  ctx.letterSpacing = `${0.05 * 38 * dpr}px`;
  // Measure time width for alignment
  const timeW = ctx.measureText(timeStr).width;
  ctx.textBaseline = 'bottom';
  ctx.fillText(timeStr, contentR, botContentY);
  ctx.shadowBlur = 0;

  // Date
  ctx.font = `200 ${12 * dpr}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(200,220,255,0.88)';
  ctx.shadowColor = 'rgba(140,185,255,0.4)';
  ctx.shadowBlur = 10 * dpr;
  ctx.letterSpacing = `${0.24 * 12 * dpr}px`;
  ctx.fillText(dateStr, contentR, botContentY + 18 * dpr);
  ctx.shadowBlur = 0;

  // Rec duration
  if (isRecording && recDurText) {
    ctx.font = `${8 * dpr}px 'Space Mono', monospace`;
    ctx.fillStyle = 'rgba(200,220,255,0.55)';
    ctx.letterSpacing = `${0.18 * 8 * dpr}px`;
    ctx.fillText(recDurText, contentR, botContentY + 34 * dpr);
  }

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // ── GLASS PILL — name only ──
  const nameStr = '// ELVIRA SAYAR';
  const tagStr  = 'PERSONAL_ARCHIVE // VISUAL_JOURNAL';
  const nameFontSize = 18 * dpr;
  const tagFontSize  = 9.5 * dpr;

  // Measure name — width + letterSpacing compensation
  ctx.font = `300 ${nameFontSize}px Inter, sans-serif`;
  const nameLetterSpacing = 0.34 * nameFontSize;
  const nameMetrics = ctx.measureText(nameStr);
  const nameRawW = nameMetrics.width;
  const nameW = nameRawW + nameLetterSpacing * (nameStr.length - 1);

  // Use real ascent/descent for tight, accurate glass height
  const nameAscent  = nameMetrics.actualBoundingBoxAscent  || nameFontSize * 0.72;
  const nameDescent = nameMetrics.actualBoundingBoxDescent || nameFontSize * 0.18;
  const nameTextH   = nameAscent + nameDescent;

  const glassPadX = 16 * dpr;
  const glassPadY = 11 * dpr;
  const glassH = nameTextH + glassPadY * 2;
  const glassW = nameW + glassPadX * 2;
  const glassX = contentL - glassPadX;
  const glassR = 6 * dpr;

  // Clock drawn with textBaseline='bottom' at botContentY — align glass bottom to same line
  const glassBottom = botContentY;
  const glassY      = glassBottom - glassH;
  // Name baseline inside glass: top of glass + padY + ascent = perfectly centred
  const tagBaseY    = glassBottom + 18 * dpr;

  // Frosted glass background
  ctx.save();
  roundRect(ctx, glassX, glassY, glassW, glassH, glassR);
  ctx.clip();
  ctx.fillStyle = 'rgba(10,18,40,0.45)';
  ctx.fillRect(glassX, glassY, glassW, glassH);
  // Scanline texture inside glass
  ctx.fillStyle = 'rgba(180,210,255,0.022)';
  for (let i = 0; i < glassH; i += 2 * dpr) {
    ctx.fillRect(glassX, glassY + i, glassW, dpr);
  }
  ctx.restore();

  // Glass border
  ctx.save();
  roundRect(ctx, glassX, glassY, glassW, glassH, glassR);
  ctx.strokeStyle = 'rgba(160,200,255,0.22)';
  ctx.lineWidth = 1 * dpr;
  ctx.stroke();
  ctx.restore();

  // Top shimmer
  ctx.save();
  const shimmer = ctx.createLinearGradient(glassX, 0, glassX + glassW, 0);
  shimmer.addColorStop(0,   'rgba(200,220,255,0)');
  shimmer.addColorStop(0.3, 'rgba(200,220,255,0.18)');
  shimmer.addColorStop(0.7, 'rgba(200,220,255,0.10)');
  shimmer.addColorStop(1,   'rgba(200,220,255,0)');
  ctx.strokeStyle = shimmer;
  ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath();
  ctx.moveTo(glassX + glassR, glassY);
  ctx.lineTo(glassX + glassW - glassR, glassY);
  ctx.stroke();
  ctx.restore();

  // Name baseline: glassY + top padding + ascent = text sits centred in glass
  const nameBaseY = glassY + glassPadY + nameAscent;
  ctx.textBaseline = 'alphabetic';
  ctx.font = `300 ${nameFontSize}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(240,248,255,1)';
  ctx.shadowColor = 'rgba(140,185,255,0.7)';
  ctx.shadowBlur = 22 * dpr;
  ctx.letterSpacing = `${0.34 * nameFontSize}px`;
  ctx.fillText(nameStr, contentL, nameBaseY);
  ctx.shadowBlur = 0;

  // Tag text — below glass, no background
  ctx.font = `${tagFontSize}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(175,205,248,0.65)';
  ctx.letterSpacing = `${0.2 * tagFontSize}px`;
  ctx.fillText(tagStr, contentL, tagBaseY);

  // Session ID (very subtle)
  ctx.font = `${7 * dpr}px 'Space Mono', monospace`;
  ctx.fillStyle = 'rgba(140,170,220,0.28)';
  ctx.letterSpacing = `${0.12 * 7 * dpr}px`;
  ctx.fillText(window._sessId || '', contentL, bBottom + 10 * dpr);

  animFrame = requestAnimationFrame(drawFrame);
}

// roundRect helper (for older browsers)
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── GEO ──
function getGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude.toFixed(4);
    const lon = pos.coords.longitude.toFixed(4);
    coordsText = `${lat}° · ${lon}°`;
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=en`)
      .then(r => r.json())
      .then(d => {
        const city = d.address.city || d.address.town || d.address.village || d.address.county || '—';
        const cc = (d.address.country_code || '').toUpperCase();
        cityText = `${city.toUpperCase()} // ${cc}`;
      }).catch(() => {});
  }, () => { cityText = 'UNDISCLOSED'; });
}

// ── CAMERA ──
async function start() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1920}, height:{ideal:1080} },
      audio: true
    });
    video.srcObject = stream;
    await video.play();
    window._sessId = 'SES_' + Date.now().toString(36).toUpperCase();
    document.getElementById('splash').style.display = 'none';
    document.getElementById('controls').classList.add('on');
    getGeo();
    drawFrame();
  } catch(e) {
    alert('Разреши доступ к камере и микрофону.');
  }
}

async function flipCam() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode, width:{ideal:1920}, height:{ideal:1080} },
    audio: true
  });
  video.srcObject = stream;
  await video.play();
}

// ── RECORD — from canvas, not raw video ──
function toggleRec() {
  if (!recorder || recorder.state === 'inactive') startRec();
  else stopRec();
}

function startRec() {
  chunks = [];

  // Capture from the CANVAS (has overlay baked in) + audio from stream
  const canvasStream = canvas.captureStream(30);
  const audioTrack = stream.getAudioTracks()[0];
  if (audioTrack) canvasStream.addTrack(audioTrack);

  const mime = ['video/webm;codecs=vp9','video/webm','video/mp4']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
  recorder = new MediaRecorder(canvasStream, mime ? {mimeType: mime} : {});
  recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
  recorder.onstop = saveClip;
  recorder.start(200);
  recStart = Date.now();
  isRecording = true;

  document.getElementById('recBtn').classList.add('on');
  document.getElementById('recTooltip').textContent = 'STOP REC';

  recTimer = setInterval(() => {
    const s = Math.floor((Date.now()-recStart)/1000);
    recDurText = `REC ${pad(Math.floor(s/60))}:${pad(s%60)}`;
  }, 1000);
}

function stopRec() {
  recorder.stop();
  clearInterval(recTimer);
  isRecording = false;
  recDurText = '';
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recTooltip').textContent = 'START REC';
}

function saveClip() {
  const blob = new Blob(chunks, {type: chunks[0]?.type || 'video/webm'});
  const n = new Date();
  const stamp = `${n.getFullYear()}${pad(n.getMonth()+1)}${pad(n.getDate())}_${pad(n.getHours())}${pad(n.getMinutes())}`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ELVIRA_${stamp}.webm`;
  a.click();
  const t = document.getElementById('toast');
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 2500);
}
</script>
</body>
</html>
